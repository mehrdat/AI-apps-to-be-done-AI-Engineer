<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Engineer Project Planner</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #08080f;
        --surface: #0f0f1a;
        --border: #1a1a2e;
        --text: #dde1e7;
        --muted: #6b7280;
        --amber: #f59e0b;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: "DM Mono", "Fira Code", "SFMono-Regular", Consolas, monospace;
      }

      button {
        font: inherit;
      }

      .app {
        min-height: 100vh;
        padding-bottom: 80px;
        background: var(--bg);
      }

      .header {
        background: linear-gradient(180deg, #0c0c20 0%, #08080f 100%);
        border-bottom: 1px solid var(--border);
        padding: 36px 20px 28px;
        text-align: center;
      }

      .eyebrow {
        font-size: 10px;
        color: var(--amber);
        letter-spacing: 5px;
        margin-bottom: 10px;
        text-transform: uppercase;
      }

      h1 {
        font-size: clamp(22px, 4vw, 38px);
        font-weight: 800;
        margin: 0 0 10px;
        color: #fff;
        letter-spacing: -1px;
      }

      .subtitle {
        color: var(--muted);
        font-size: 13px;
        max-width: 520px;
        margin: 0 auto 20px;
        line-height: 1.7;
      }

      .progress-wrap {
        display: inline-flex;
        align-items: center;
        gap: 14px;
        background: #111120;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 18px;
      }

      .progress-label,
      .progress-count,
      .tab,
      .chip,
      .meta,
      .section-label,
      .pill,
      .tiny {
        user-select: none;
      }

      .progress-label {
        font-size: 12px;
        color: var(--muted);
      }

      .progress-bar {
        width: 120px;
        height: 6px;
        background: #222;
        border-radius: 3px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        background: var(--amber);
        border-radius: 3px;
        transition: width 0.4s;
      }

      .progress-count {
        font-size: 13px;
        color: var(--amber);
        font-weight: 700;
      }

      .tabs {
        display: flex;
        justify-content: center;
        gap: 6px;
        padding: 20px 16px 0;
        flex-wrap: wrap;
      }

      .tab {
        padding: 9px 18px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--muted);
        cursor: pointer;
        font-size: 12px;
        font-weight: 700;
        transition: all 0.2s;
      }

      .tab.active {
        border-color: var(--amber);
        background: #1a1500;
        color: var(--amber);
      }

      .container {
        max-width: 880px;
        margin: 0 auto;
        padding: 24px 16px 0;
      }

      .panel,
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
      }

      .stack {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .panel-copy,
      .lead,
      .small-copy,
      .doc-copy,
      .note,
      .resource-url,
      .item-copy,
      .desc,
      .doc-text,
      .commit-desc {
        color: #aaa;
      }

      .lead,
      .small-copy,
      .doc-copy {
        font-size: 13px;
        line-height: 1.8;
      }

      .project-header,
      .phase-header {
        cursor: pointer;
      }

      .project-header {
        padding: 18px 20px;
        display: flex;
        gap: 16px;
        align-items: flex-start;
      }

      .project-emoji {
        font-size: 28px;
        flex-shrink: 0;
        line-height: 1;
      }

      .project-main {
        flex: 1;
      }

      .project-top {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .project-name,
      .phase-title,
      .resource-name,
      .doc-title,
      .commit-prefix,
      .golden-title {
        font-weight: 700;
        color: #fff;
      }

      .project-name {
        font-size: 16px;
        font-weight: 800;
      }

      .badge,
      .meta,
      .type,
      .free,
      .priority {
        font-size: 10px;
        padding: 2px 8px;
        border-radius: 4px;
        border: 1px solid transparent;
        flex-shrink: 0;
      }

      .meta,
      .type {
        background: #141428;
        border-color: #2a2a50;
        color: #a0c4ff;
      }

      .badge {
        font-weight: 700;
      }

      .project-tagline {
        color: var(--muted);
        font-size: 13px;
        margin-top: 4px;
      }

      .chevron {
        color: var(--muted);
        font-size: 16px;
        transform-origin: center;
        transition: transform 0.25s;
        flex-shrink: 0;
      }

      .chevron.open {
        transform: rotate(180deg);
      }

      .project-body {
        padding: 0 20px 22px;
        border-top: 1px solid var(--border);
      }

      .block {
        margin-bottom: 14px;
      }

      .pill-label,
      .section-label,
      .tiny {
        font-size: 11px;
        letter-spacing: 2px;
        margin-bottom: 8px;
        text-transform: uppercase;
      }

      .section-label {
        color: var(--muted);
      }

      .highlight,
      .hf,
      .blog,
      .golden,
      .commitment {
        border-radius: 8px;
        padding: 12px 14px;
      }

      .highlight {
        background: #0a1a10;
        border: 1px solid #1a3a1a;
      }

      .hf {
        background: #140a1a;
        border: 1px solid #2a1a3a;
      }

      .blog {
        background: #1a1400;
        border: 1px solid #3a2a00;
      }

      .golden {
        background: #0a1a0a;
        border: 1px solid #1a3a1a;
      }

      .doc-box {
        background: #0d0d1e;
        border: 1px solid #2a2a4e;
        border-radius: 6px;
        padding: 10px 14px;
      }

      .stack-chips,
      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .chip {
        background: #141428;
        border: 1px solid #2a2a50;
        color: #a0c4ff;
        font-size: 11px;
        padding: 3px 10px;
        border-radius: 4px;
      }

      .todo,
      .phase-item {
        display: flex;
        gap: 12px;
        align-items: flex-start;
        padding: 7px 10px;
        border-radius: 6px;
        margin-bottom: 4px;
        cursor: pointer;
        transition: background 0.2s;
      }

      .todo.on {
        background: #0d1a0d;
      }

      .phase-item.on {
        background: #0a1a0a;
      }

      .box,
      .phase-box {
        width: 18px;
        height: 18px;
        border: 2px solid #333;
        border-radius: 4px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        transition: all 0.2s;
        margin-top: 1px;
      }

      .box.on {
        background: #06d6a0;
        border-color: #06d6a0;
      }

      .phase-box.on {
        background: currentColor;
      }

      .check {
        color: #000;
        font-size: 11px;
        font-weight: 900;
      }

      .item-text,
      .phase-text {
        color: #aaa;
        font-size: 13px;
        line-height: 1.6;
      }

      .done-text {
        color: #555;
        text-decoration: line-through;
      }

      .project-open {
        border-color: #1a1a2e;
      }

      .project-open[data-accent] {
        border-color: var(--accent);
      }

      .phase-head {
        padding: 16px 20px;
        cursor: pointer;
      }

      .phase-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
      }

      .phase-meta {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .phase-count {
        font-size: 12px;
        font-weight: 700;
      }

      .phase-bar {
        width: 80px;
        height: 5px;
        background: #222;
        border-radius: 3px;
        overflow: hidden;
      }

      .phase-fill {
        height: 100%;
        border-radius: 3px;
        transition: width 0.4s;
      }

      .resource-head {
        padding: 14px 20px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 2px;
        flex-shrink: 0;
      }

      .resource-row {
        padding: 12px 20px;
        display: flex;
        gap: 14px;
        align-items: center;
        flex-wrap: wrap;
        border-bottom: 1px solid var(--border);
      }

      .resource-row:last-child {
        border-bottom: none;
      }

      .resource-main {
        flex: 1;
        min-width: 200px;
      }

      .resource-name {
        font-size: 13px;
        color: #dde;
        margin-bottom: 2px;
      }

      .resource-url {
        font-size: 11px;
      }

      .label-row {
        display: flex;
        gap: 6px;
        flex-shrink: 0;
      }

      .type,
      .free,
      .priority {
        padding: 2px 8px;
      }

      .free {
        background: #0a1a0a;
        color: #06d6a0;
        border-color: #1a3a1a;
      }

      .paid {
        background: #1a0a0a;
        color: #e63946;
        border-color: #3a1a1a;
      }

      .priority.must {
        background: #1a1400;
        color: var(--amber);
        border-color: #3a2a00;
        font-weight: 700;
      }

      .priority.high,
      .priority.medium {
        background: #111;
        color: var(--muted);
        border-color: #222;
      }

      .golden-panel {
        background: #0a1a0a;
        border: 1px solid #1a3a1a;
        border-radius: 10px;
        padding: 16px 20px;
        margin-bottom: 20px;
      }

      .golden-title {
        font-size: 12px;
        color: #06d6a0;
        margin-bottom: 8px;
      }

      .doc-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 18px 20px;
      }

      .doc-top {
        display: flex;
        gap: 12px;
        align-items: flex-start;
      }

      .doc-icon {
        font-size: 22px;
        flex-shrink: 0;
      }

      .doc-content {
        flex: 1;
      }

      .doc-title {
        font-size: 14px;
        margin-bottom: 8px;
      }

      .example-label {
        font-size: 10px;
        color: #555;
        letter-spacing: 2px;
        margin-bottom: 4px;
        text-transform: uppercase;
      }

      .example-text {
        color: #a0c4ff;
        font-size: 12px;
        line-height: 1.7;
        font-style: italic;
      }

      .commitment {
        margin-top: 20px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 20px;
      }

      .commit-title {
        font-weight: 700;
        font-size: 14px;
        color: #fff;
        margin-bottom: 14px;
      }

      .commit-row {
        display: flex;
        gap: 12px;
        padding: 7px 0;
        border-bottom: 1px solid var(--border);
      }

      .commit-row:last-of-type {
        border-bottom: none;
      }

      .commit-prefix {
        color: var(--amber);
        font-size: 12px;
        min-width: 80px;
        flex-shrink: 0;
      }

      .commit-desc {
        font-size: 12px;
        line-height: 1.6;
      }

      .hidden {
        display: none;
      }

      @media (max-width: 720px) {
        .project-header,
        .phase-head,
        .resource-head,
        .resource-row,
        .doc-card,
        .project-body {
          padding-left: 16px;
          padding-right: 16px;
        }

        .label-row {
          flex-wrap: wrap;
        }

        .phase-row {
          align-items: flex-start;
        }

        .phase-meta {
          width: 100%;
          justify-content: flex-start;
        }
      }
    </style>
  </head>

        const id = target.dataset.id;

        if (action === "tab") {
          setTab(id);
          return;
        }

        if (action === "project") {
          toggleProject(id);
          return;
        }

        if (action === "phase") {
          togglePhase(id);
          return;
        }

        if (action === "toggle") {
          toggle(id);
        }
      });

      render();
    </script>
  </body>
</html>
